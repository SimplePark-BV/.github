---
name: Feature Request
description: Suggest an idea or improvement
type: feature
body:
  - type: dropdown
    id: size
    attributes:
      label: Size
      description: Estimated effort for this feature.
      options:
        - "Size:0"
        - "Size:1"
        - "Size:2"
        - "Size:3"
        - "Size:5"
        - "Size:8"
        - "Size:13"
        - "Size:20"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: >-
        A clear and concise description of the
        feature or improvement you'd like.
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: >-
        Describe the problem or workflow this
        feature would address. Why is it needed?
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: >-
        A clear and concise description of how
        you'd like this to work.
    validations:
      required: false

  - type: textarea
    id: alternatives-considered
    attributes:
      label: Alternatives Considered
      description: >-
        Describe any alternative solutions or
        workarounds you've considered.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: >-
        Add any other context, mockups, or references
        about the feature request here.
    validations:
      required: false
