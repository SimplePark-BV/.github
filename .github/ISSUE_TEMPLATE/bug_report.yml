name: Bug Report
description: Report a bug to help us improve
type: bug
body:
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How critical is this bug?
      options:
        - P0 (Critical — pick up ASAP)
        - P1 (High)
        - P2 (Medium)
        - P3 (Low)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Walk us through how to reproduce the bug step by step.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: upload
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, upload screenshots to help explain the problem.
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g., macOS 15, Windows 11, Ubuntu 24.04"
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Version / Commit
      placeholder: "e.g., v1.2.3 or commit SHA"
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
    validations:
      required: false
